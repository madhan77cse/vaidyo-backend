sos.alert.title=\uD83D\uDEA8 કટોકટી SOS \uD83D\uDEA8
sos.alert.body={0}ને તાત્કાલિક મદદ જોઈએ છે!\n\n\uD83D\uDCCD લાઇવ સ્થાન: {1}\n\nકૃપા કરીને તેમનો સંપર્ક કરો અથવા મદદ મોકલો.

ambulance.assigned.title=\uD83D\uDE91 નવી એમ્બ્યુલન્સ વિનંતી
ambulance.assigned.body=દર્દી: {0}\nપિકઅપ સરનામું: {1}\n\uD83D\uDCCD સ્થાન: {2}
ambulance.cancelled.title=\u274C એમ્બ્યુલન્સ વિનંતી રદ
ambulance.cancelled.body={0} ખાતે પિકઅપ વિનંતી દર્દી દ્વારા રદ કરવામાં આવી.

welcome.title=\uD83C\uDFE5 વૈદ્યોમાં આપનું સ્વાગત છે!
welcome.body=નમસ્તે {0}!\n\nતમારું ટેલિગ્રામ વૈદ્યો સાથે જોડાઈ ગયું છે.\nતમને દવાની રિમાઇન્ડર, આરોગ્ય ચેતવણીઓ અને એપોઇન્ટમેન્ટ અપડેટ્સ મળશે.\n\nસ્વસ્થ રહો! \uD83D\uDCAA

medicine.reminder.title=\uD83D\uDC8A દવા રિમાઇન્ડર
medicine.reminder.body=નમસ્તે {0}! તમારી દવા લેવાનો સમય થઈ ગયો:\n\n\uD83D\uDD39 {1}{2}\n\nદવા લીધા પછી વૈદ્યો એપ્પમાં પુષ્ટિ કરો. \u2705

medicine.missed.title=\u26A0\uFE0F દવા ચૂકી ગવાની ચેતવણી
medicine.missed.body=તમારા દર્દી {0} એ તેમની દવા લીધી નથી:\n\n\uD83D\uDD34 {1}\n\nકૃપા કરીને તરત જ તેમની તપાસ કરો!