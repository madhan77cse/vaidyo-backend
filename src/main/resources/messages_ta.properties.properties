# SOS alerts
sos.alert.title=\uD83D\uDEA8 அவசர SOS \uD83D\uDEA8
sos.alert.body={0} உடனடி உதவி தேவை!\n\n\uD83D\uDCCD நேரடி இருப்பிடம்: {1}\n\nதயவுசெய்து அவர்களை தொடர்பு கொள்ளுங்கள் அல்லது உதவி அனுப்புங்கள்.

# Ambulance dispatch
ambulance.assigned.title=\uD83D\uDE91 புதிய ஆம்புலன்ஸ் கோரிக்கை
ambulance.assigned.body=நோயாளி: {0}\nபிக்கப் முகவரி: {1}\n\uD83D\uDCCD இருப்பிடம்: {2}
ambulance.cancelled.title=\u274C ஆம்புலன்ஸ் கோரிக்கை ரத்து செய்யப்பட்டது
ambulance.cancelled.body={0} என்ற முகவரியில் பிக்கப் கோரிக்கை நோயாளியால் ரத்து செய்யப்பட்டது.

# Welcome
welcome.title=\uD83C\uDFE5 வைத்யோவிற்கு வரவேற்கிறோம்!
welcome.body=வணக்கம் {0}!\n\nஉங்கள் டெலிகிராம் வைத்யோவுடன் இணைக்கப்பட்டது.\nமருந்து நினைவூட்டல்கள், உடல்நல எச்சரிக்கைகள் மற்றும் சந்திப்பு புதுப்பிப்புகளை நீங்கள் பெறுவீர்கள்.\n\nஆரோக்கியமாக இருங்கள்! \uD83D\uDCAA

# Medicine reminder
medicine.reminder.title=\uD83D\uDC8A மருந்து நினைவூட்டல்
medicine.reminder.body=வணக்கம் {0}! உங்கள் மருந்து எடுக்கும் நேரம்:\n\n\uD83D\uDD39 {1}{2}\n\nமருந்து எடுத்த பிறகு வைத்யோ ஆப்பில் உறுதிப்படுத்தவும். \u2705

# Missed medicine
medicine.missed.title=\u26A0\uFE0F தவறிய மருந்து எச்சரிக்கை
medicine.missed.body=உங்கள் நோயாளி {0} தங்கள் மருந்தை தவறவிட்டார்:\n\n\uD83D\uDD34 {1}\n\nதயவுசெய்து உடனே அவர்களை சரிபாருங்கள்!