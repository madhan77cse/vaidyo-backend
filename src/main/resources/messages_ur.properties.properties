ambulance.cancelled.body={0} پر پک اپ درخواست مریض نے منسوخ کر دی۔

welcome.title=\uD83C\uDFE5 ویدیو میں خوش آمدید!
welcome.body=السلام علیکم {0}!\n\nآپ کا ٹیلیگرام ویدیو سے منسلک ہو گیا ہے۔\nآپ کو دوائی کی یاد دہانیاں، صحت کی انتباہات اور ملاقات کی تازہ کاریاں ملیں گی۔\n\nصحت مند رہیں! \uD83D\uDCAA

medicine.reminder.title=\uD83D\uDC8A دوائی یاد دہانی
medicine.reminder.body=السلام علیکم {0}! آپ کی دوائی لینے کا وقت ہو گیا:\n\n\uD83D\uDD39 {1}{2}\n\nدوائی لینے کے بعد ویدیو ایپ میں تصدیق کریں۔ \u2705

medicine.missed.title=\u26A0\uFE0F دوائی چھوٹنے کی انتباہ
medicine.missed.body=آپ کے مریض {0} نے اپنی دوائی نہیں لی:\n\n\uD83D\uDD34 {1}\n\nبراہ کرم فوری طور پر ان کی جانچ کریں!