sos.alert.title=\uD83D\uDEA8 ہنگامی SOS \uD83D\uDEA8
sos.alert.body={0} کو فوری مدد کی ضرورت ہے!\n\n\uD83D\uDCCD براہ راست مقام: {1}\n\nبراہ کرم ان سے رابطہ کریں یا مدد بھیجیں۔

ambulance.assigned.title=\uD83D\uDE91 نئی ایمبولینس درخواست
ambulance.assigned.body=مریض: {0}\nپک اپ پتہ: {1}\n\uD83D\uDCCD مقام: {2}
