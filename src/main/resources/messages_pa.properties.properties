sos.alert.title=\uD83D\uDEA8 ਐਮਰਜੈਂਸੀ SOS \uD83D\uDEA8
sos.alert.body={0} ਨੂੰ ਤੁਰੰਤ ਮਦਦ ਚਾਹੀਦੀ ਹੈ!\n\n\uD83D\uDCCD ਲਾਈਵ ਟਿਕਾਣਾ: {1}\n\nਕਿਰਪਾ ਕਰਕੇ ਉਨ੍ਹਾਂ ਨਾਲ ਸੰਪਰਕ ਕਰੋ ਜਾਂ ਮਦਦ ਭੇਜੋ।

ambulance.assigned.title=\uD83D\uDE91 ਨਵੀਂ ਐਂਬੂਲੈਂਸ ਬੇਨਤੀ
ambulance.assigned.body=ਮਰੀਜ਼: {0}\nਪਿਕਅੱਪ ਪਤਾ: {1}\n\uD83D\uDCCD ਟਿਕਾਣਾ: {2}
ambulance.cancelled.title=\u274C ਐਂਬੂਲੈਂਸ ਬੇਨਤੀ ਰੱਦ
ambulance.cancelled.body={0} 'ਤੇ ਪਿਕਅੱਪ ਬੇਨਤੀ ਮਰੀਜ਼ ਦੁਆਰਾ ਰੱਦ ਕੀਤੀ ਗਈ।

welcome.title=\uD83C\uDFE5 ਵੈਦਯੋ ਵਿੱਚ ਤੁਹਾਡਾ ਸੁਆਗਤ ਹੈ!
welcome.body=ਸਤ ਸ੍ਰੀ ਅਕਾਲ {0}!\n\nਤੁਹਾਡਾ ਟੈਲੀਗ੍ਰਾਮ ਵੈਦਯੋ ਨਾਲ ਜੁੜ ਗਿਆ ਹੈ।\nਤੁਹਾਨੂੰ ਦਵਾਈ ਰੀਮਾਈਂਡਰ, ਸਿਹਤ ਚੇਤਾਵਨੀਆਂ ਅਤੇ ਅਪੌਇੰਟਮੈਂਟ ਅੱਪਡੇਟ ਮਿਲਣਗੇ।\n\nਸਿਹਤਮੰਦ ਰਹੋ! \uD83D\uDCAA

medicine.reminder.title=\uD83D\uDC8A ਦਵਾਈ ਰੀਮਾਈਂਡਰ
medicine.reminder.body=ਸਤ ਸ੍ਰੀ ਅਕਾਲ {0}! ਤੁਹਾਡੀ ਦਵਾਈ ਲੈਣ ਦਾ ਸਮਾਂ ਆ ਗਿਆ ਹੈ:\n\n\uD83D\uDD39 {1}{2}\n\nਦਵਾਈ ਲੈਣ ਤੋਂ ਬਾਅਦ ਵੈਦਯੋ ਐਪ ਵਿੱਚ ਪੁਸ਼ਟੀ ਕਰੋ। \u2705

medicine.missed.title=\u26A0\uFE0F ਦਵਾਈ ਖੁੰਝ ਜਾਣ ਦੀ ਚੇਤਾਵਨੀ
medicine.missed.body=ਤੁਹਾਡੇ ਮਰੀਜ਼ {0} ਨੇ ਆਪਣੀ ਦਵਾਈ ਨਹੀਂ ਲਈ:\n\n\uD83D\uDD34 {1}\n\nਕਿਰਪਾ ਕਰਕੇ ਤੁਰੰਤ ਉਨ੍ਹਾਂ ਦੀ ਜਾਂਚ ਕਰੋ!