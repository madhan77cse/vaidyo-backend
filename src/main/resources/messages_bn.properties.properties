welcome.title=\uD83C\uDFE5 বৈদ্যোতে স্বাগতম!
welcome.body=নমস্কার {0}!\n\nআপনার টেলিগ্রাম বৈদ্যোর সাথে সংযুক্ত হয়েছে।\nআপনি ওষুধের রিমাইন্ডার, স্বাস্থ্য সতর্কতা এবং অ্যাপয়েন্টমেন্ট আপডেট পাবেন।\n\nসুস্থ থাকুন! \uD83D\uDCAA

medicine.reminder.title=\uD83D\uDC8A ওষুধের রিমাইন্ডার
medicine.reminder.body=নমস্কার {0}! আপনার ওষুধ খাওয়ার সময় হয়েছে:\n\n\uD83D\uDD39 {1}{2}\n\nওষুধ খাওয়ার পর বৈদ্যো অ্যাপে নিশ্চিত করুন। \u2705

medicine.missed.title=\u26A0\uFE0F ওষুধ মিস করার সতর্কতা
medicine.missed.body=আপনার রোগী {0} তাদের ওষুধ খাননি:\n\n\uD83D\uDD34 {1}\n\nঅনুগ্রহ করে অবিলম্বে তাদের দেখুন!