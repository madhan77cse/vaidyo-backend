sos.alert.title=\uD83D\uDEA8 ଜରୁରୀ SOS \uD83D\uDEA8
sos.alert.body={0}ଙ୍କୁ ତୁରନ୍ତ ସାହାଯ୍ୟ ଦରକାର!\n\n\uD83D\uDCCD ଲାଇଭ ଅବସ୍ଥାନ: {1}\n\nଦୟାକରି ସେମାନଙ୍କ ସହ ଯୋଗାଯୋଗ କରନ୍ତୁ ବା ସାହାଯ୍ୟ ପଠାନ୍ତୁ।

ambulance.assigned.title=\uD83D\uDE91 ନୂଆ ଆମ୍ବୁଲାନ୍ସ ଅନୁରୋଧ
ambulance.assigned.body=ରୋଗୀ: {0}\nପିକଅପ୍ ଠିକଣା: {1}\n\uD83D\uDCCD ଅବସ୍ଥାନ: {2}
ambulance.cancelled.title=\u274C ଆମ୍ବୁଲାନ୍ସ ଅନୁରୋଧ ବାତିଲ
ambulance.cancelled.body={0} ରେ ପିକଅପ୍ ଅନୁରୋଧ ରୋଗୀ ଦ୍ୱାରା ବାତିଲ କରାଗଲା।

welcome.title=\uD83C\uDFE5 ବୈଦ୍ୟୋରେ ଆପଣଙ୍କୁ ସ୍ୱାଗତ!
welcome.body=ନମସ୍କାର {0}!\n\nଆପଣଙ୍କ ଟେଲିଗ୍ରାମ ବୈଦ୍ୟୋ ସହ ସଂଯୁକ୍ତ ହୋଇଛି।\nଆପଣ ଔଷଧ ସ୍ମରଣ, ସ୍ୱାସ୍ଥ୍ୟ ସତର୍କତା ଏବଂ ଅ୍ୟାପଏଣ୍ଟମେଣ୍ଟ ଅପ୍ଡେଟ ପାଇବେ।\n\nସୁସ୍ଥ ରୁହନ୍ତୁ! \uD83D\uDCAA

medicine.reminder.title=\uD83D\uDC8A ଔଷଧ ସ୍ମରଣ
medicine.reminder.body=ନମସ୍କାର {0}! ଆପଣଙ୍କ ଔଷଧ ଖାଇବାର ସମୟ ହୋଇଛି:\n\n\uD83D\uDD39 {1}{2}\n\nଔଷଧ ଖାଇବା ପରେ ବୈଦ୍ୟୋ ଆ୍ୟପ୍ ରେ ନିଶ୍ଚିତ କରନ୍ତୁ। \u2705

medicine.missed.title=\u26A0\uFE0F ଔଷଧ ଛୁଟିଯିବା ସତର୍କତା
medicine.missed.body=ଆପଣଙ୍କ ରୋଗୀ {0} ସେମାନଙ୍କ ଔଷଧ ଖାଇ ନାହାନ୍ତି:\n\n\uD83D\uDD34 {1}\n\nଦୟାକରି ତୁରନ୍ତ ସେମାନଙ୍କୁ ଯାଞ୍ଚ କରନ୍ତୁ!