sos.alert.title=\uD83D\uDEA8 ತುರ್ತು SOS \uD83D\uDEA8
sos.alert.body={0}ಗೆ ತಕ್ಷಣದ ಸಹಾಯ ಬೇಕು!\n\n\uD83D\uDCCD ನೇರ ಸ್ಥಳ: {1}\n\nದಯವಿಟ್ಟು ಅವರನ್ನು ಸಂಪರ್ಕಿಸಿ ಅಥವಾ ಸಹಾಯ ಕಳುಹಿಸಿ.

ambulance.assigned.title=\uD83D\uDE91 ಹೊಸ ಆಂಬ್ಯುಲೆನ್ಸ್ ವಿನಂತಿ
ambulance.assigned.body=ರೋಗಿ: {0}\nಪಿಕಪ್ ವಿಳಾಸ: {1}\n\uD83D\uDCCD ಸ್ಥಳ: {2}
ambulance.cancelled.title=\u274C ಆಂಬ್ಯುಲೆನ್ಸ್ ವಿನಂತಿ ರದ್ದುಗೊಂಡಿದೆ
ambulance.cancelled.body={0} ನಲ್ಲಿ ಪಿಕಪ್ ವಿನಂತಿಯನ್ನು ರೋಗಿಯು ರದ್ದುಗೊಳಿಸಿದ್ದಾರೆ.

welcome.title=\uD83C\uDFE5 ವೈದ್ಯೋಗೆ ಸ್ವಾಗತ!
welcome.body=ನಮಸ್ಕಾರ {0}!\n\nನಿಮ್ಮ ಟೆಲಿಗ್ರಾಮ್ ವೈದ್ಯೋಗೆ ಸಂಪರ್ಕಿಸಲಾಗಿದೆ.\nನಿಮಗೆ ಔಷಧ ಜ್ಞಾಪನೆಗಳು, ಆರೋಗ್ಯ ಎಚ್ಚರಿಕೆಗಳು ಮತ್ತು ಅಪಾಯಿಂಟ್‌ಮೆಂಟ್ ಅಪ್‌ಡೇಟ್‌ಗಳು ಬರುತ್ತವೆ.\n\nಆರೋಗ್ಯವಾಗಿರಿ! \uD83D\uDCAA

medicine.reminder.title=\uD83D\uDC8A ಔಷಧ ಜ್ಞಾಪನೆ
medicine.reminder.body=ನಮಸ್ಕಾರ {0}! ನಿಮ್ಮ ಔಷಧ ತೆಗೆದುಕೊಳ್ಳುವ ಸಮಯ:\n\n\uD83D\uDD39 {1}{2}\n\nಔಷಧ ತೆಗೆದುಕೊಂಡ ನಂತರ ವೈದ್ಯೋ ಆ್ಯಪ್‌ನಲ್ಲಿ ದೃಢೀಕರಿಸಿ. \u2705

medicine.missed.title=\u26A0\uFE0F ಔಷಧ ತಪ್ಪಿಸಿಕೊಂಡ ಎಚ್ಚರಿಕೆ
medicine.missed.body=ನಿಮ್ಮ ರೋಗಿ {0} ತಮ್ಮ ಔಷಧ ತೆಗೆದುಕೊಂಡಿಲ್ಲ:\n\n\uD83D\uDD34 {1}\n\nದಯವಿಟ್ಟು ತಕ್ಷಣ ಅವರನ್ನು ಪರಿಶೀಲಿಸಿ!