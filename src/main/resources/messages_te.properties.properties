sos.alert.title=\uD83D\uDEA8 అత్యవసర SOS \uD83D\uDEA8
sos.alert.body={0}కి తక్షణ సహాయం అవసరం!\n\n\uD83D\uDCCD లైవ్ లొకేషన్: {1}\n\nదయచేసి వారిని సంప్రదించండి లేదా సహాయం పంపండి.

ambulance.assigned.title=\uD83D\uDE91 కొత్త యాంబులెన్స్ అభ్యర్థన
ambulance.assigned.body=రోగి: {0}\nపికప్ చిరునామా: {1}\n\uD83D\uDCCD లొకేషన్: {2}
ambulance.cancelled.title=\u274C యాంబులెన్స్ అభ్యర్థన రద్దు చేయబడింది
ambulance.cancelled.body={0} వద్ద పికప్ అభ్యర్థన రోగిచే రద్దు చేయబడింది.

welcome.title=\uD83C\uDFE5 వైద్యోకి స్వాగతం!
welcome.body=నమస్కారం {0}!\n\nమీ టెలిగ్రామ్ వైద్యోతో అనుసంధానించబడింది.\nమీకు మందుల రిమైండర్లు, ఆరోగ్య హెచ్చరికలు మరియు అపాయింట్‌మెంట్ అప్‌డేట్‌లు అందుతాయి.\n\nఆరోగ్యంగా ఉండండి! \uD83D\uDCAA

medicine.reminder.title=\uD83D\uDC8A మందుల రిమైండర్
medicine.reminder.body=నమస్కారం {0}! మీ మందు తీసుకునే సమయం:\n\n\uD83D\uDD39 {1}{2}\n\nమందు తీసుకున్న తర్వాత వైద్యో యాప్‌లో నిర్ధారించండి. \u2705

medicine.missed.title=\u26A0\uFE0F మందు మిస్సైన హెచ్చరిక
medicine.missed.body=మీ రోగి {0} తమ మందు తీసుకోలేదు:\n\n\uD83D\uDD34 {1}\n\nదయచేసి వెంటనే వారిని తనిఖీ చేయండి!