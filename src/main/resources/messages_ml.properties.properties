sos.alert.title=\uD83D\uDEA8 അടിയന്തര SOS \uD83D\uDEA8
sos.alert.body={0}ന് ഉടനടി സഹായം ആവശ്യമാണ്!\n\n\uD83D\uDCCD തത്സമയ സ്ഥാനം: {1}\n\nദയവായി അവരെ ബന്ധപ്പെടുക അല്ലെങ്കിൽ സഹായം അയക്കുക.

ambulance.assigned.title=\uD83D\uDE91 പുതിയ ആംബുലൻസ് അഭ്യർത്ഥന
ambulance.assigned.body=രോഗി: {0}\nപിക്കപ്പ് വിലാസം: {1}\n\uD83D\uDCCD സ്ഥാനം: {2}
ambulance.cancelled.title=\u274C ആംബുലൻസ് അഭ്യർത്ഥന റദ്ദാക്കി
ambulance.cancelled.body={0} എന്ന വിലാസത്തിൽ പിക്കപ്പ് അഭ്യർത്ഥന രോഗി റദ്ദാക്കി.

welcome.title=\uD83C\uDFE5 വൈദ്യോയിലേക്ക് സ്വാഗതം!
welcome.body=നമസ്കാരം {0}!\n\nനിങ്ങളുടെ ടെലഗ്രാം വൈദ്യോയുമായി ബന്ധിപ്പിച്ചു.\nമരുന്ന് ഓർമ്മപ്പെടുത്തലുകൾ, ആരോഗ്യ മുന്നറിയിപ്പുകൾ, അപ്പോയിന്റ്മെന്റ് അപ്ഡേറ്റുകൾ ലഭിക്കും.\n\nആരോഗ്യത്തോടെ ഇരിക്കൂ! \uD83D\uDCAA

medicine.reminder.title=\uD83D\uDC8A മരുന്ന് ഓർമ്മപ്പെടുത്തൽ
medicine.reminder.body=നമസ്കാരം {0}! നിങ്ങളുടെ മരുന്ന് കഴിക്കാനുള്ള സമയം:\n\n\uD83D\uDD39 {1}{2}\n\nമരുന്ന് കഴിച്ചതിന് ശേഷം വൈദ്യോ ആപ്പിൽ സ്ഥിരീകരിക്കുക. \u2705

medicine.missed.title=\u26A0\uFE0F മരുന്ന് നഷ്ടപ്പെട്ട മുന്നറിയിപ്പ്
medicine.missed.body=നിങ്ങളുടെ രോഗി {0} മരുന്ന് കഴിച്ചില്ല:\n\n\uD83D\uDD34 {1}\n\nദയവായി ഉടനടി അവരെ പരിശോധിക്കുക!