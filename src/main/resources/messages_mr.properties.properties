sos.alert.title=\uD83D\uDEA8 आपत्कालीन SOS \uD83D\uDEA8
sos.alert.body={0}ला तातडीची मदत हवी आहे!\n\n\uD83D\uDCCD थेट स्थान: {1}\n\nकृपया त्यांच्याशी संपर्क साधा किंवा मदत पाठवा.

ambulance.assigned.title=\uD83D\uDE91 नवीन रुग्णवाहिका विनंती
ambulance.assigned.body=रुग्ण: {0}\nपिकअप पत्ता: {1}\n\uD83D\uDCCD स्थान: {2}
ambulance.cancelled.title=\u274C रुग्णवाहिका विनंती रद्द
ambulance.cancelled.body={0} येथील पिकअप विनंती रुग्णाने रद्द केली.

welcome.title=\uD83C\uDFE5 वैद्यो मध्ये आपले स्वागत आहे!
welcome.body=नमस्कार {0}!\n\nतुमचे टेलिग्राम वैद्योशी जोडले गेले आहे.\nतुम्हाला औषध स्मरणपत्रे, आरोग्य सूचना आणि अपॉइंटमेंट अपडेट मिळतील.\n\nनिरोगी राहा! \uD83D\uDCAA

medicine.reminder.title=\uD83D\uDC8A औषध स्मरणपत्र
medicine.reminder.body=नमस्कार {0}! तुमचे औषध घेण्याची वेळ झाली:\n\n\uD83D\uDD39 {1}{2}\n\nऔषध घेतल्यानंतर वैद्यो अॅपमध्ये पुष्टी करा. \u2705

medicine.missed.title=\u26A0\uFE0F औषध चुकल्याचा इशारा
medicine.missed.body=तुमच्या रुग्णाने {0} त्यांचे औषध घेतले नाही:\n\n\uD83D\uDD34 {1}\n\nकृपया त्यांची लगेच तपासणी करा!